server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # v0.10 follow-up: proxy /api/* to the backend container *inside* the
    # Docker network, instead of the frontend calling an absolute
    # http://<LAN-IP>:58000 URL baked in at build time. Baking in a fixed
    # LAN IP only works from devices on that exact LAN -- it breaks the
    # moment someone connects over Tailscale (or any other network) that
    # can't route to that private IP directly, even though it CAN reach
    # this nginx container's own address just fine. Proxying like this
    # means the browser always calls "whatever host/port it used to load
    # the page" + "/api/...", which is correct no matter how the device
    # reached this server (LAN IP, Tailscale IP, hostname, ...).
    location /api/ {
        proxy_pass http://food_order_api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue Router uses HTML5 history mode (createWebHistory), so URLs like
    # /restaurants/5 or /orders/12 have no matching static file on disk.
    # Without this fallback, nginx 404s on any direct load / refresh / shared
    # link that isn't the bare "/" -- only client-side navigation (clicking
    # links inside the already-loaded app) worked. This tells nginx to serve
    # index.html for any path it can't find a real file for, and Vue Router
    # then takes over and renders the right screen client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
