# Food-order app stack. Designed to sit alongside the user's existing
# sit_web_system / gitea / jenkins containers on the same x86 VM — just give
# each service a distinct container_name / port / volume so nothing collides.

services:
  food_order_db:
    image: postgres:14
    container_name: food_order_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: food_order
      POSTGRES_PASSWORD: food_order   # CHANGE_ME before deploying
      POSTGRES_DB: food_order
    volumes:
      - food_order_db_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"   # host port kept unusual to avoid clashing with sit_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_order -d food_order"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  food_order_api:
    build: ./backend
    container_name: food_order_api
    restart: unless-stopped
    depends_on:
      food_order_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://food_order:food_order@food_order_db:5432/food_order
      CORS_ORIGINS: http://localhost:5173,http://mike1-virtual-machine:55173,http://192.168.138.68:55173
      # v0.9: AI 菜單解析 -- read from a .env file next to this docker-compose.yml
      # (see .env.example). The ${VAR:-} form means this is safe even if .env
      # doesn't exist yet or doesn't define these -- it just falls back to an
      # empty string, and the AI feature is simply unavailable until you set
      # a key, instead of breaking the whole deploy.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "58000:8000"
    command: >
      sh -c "python -m app.seed; uvicorn app.main:app --host 0.0.0.0 --port 8000"

  food_order_web:
    build:
      context: ./frontend
      args:
        # Vite bakes this in at build time -- it must be reachable from the
        # *browser* (phone/PC), so use an address those devices can actually
        # resolve. The hostname "mike1-virtual-machine" isn't resolvable from
        # phones on this network, so use the VM's LAN IP directly instead.
        # If the VM's IP ever changes (DHCP), update this and rebuild.
        VITE_API_BASE: http://192.168.138.68:58000
    container_name: food_order_web
    restart: unless-stopped
    depends_on:
      - food_order_api
    ports:
      - "55173:80"

volumes:
  food_order_db_data:
