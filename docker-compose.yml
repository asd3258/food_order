# Food-order app stack. Designed to sit alongside the user's existing
# sit_web_system / gitea / jenkins containers on the same x86 VM — just give
# each service a distinct container_name / port / volume so nothing collides.

services:
  food_order_db:
    image: postgres:14
    container_name: food_order_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: food_order
      POSTGRES_PASSWORD: food_order   # CHANGE_ME before deploying
      POSTGRES_DB: food_order
    volumes:
      - food_order_db_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"   # host port kept unusual to avoid clashing with sit_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_order -d food_order"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  food-order-minio:
    image: minio/minio:latest
    container_name: food-order-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: food_order_minio      # CHANGE_ME before deploying (same idea as the Postgres password below)
      MINIO_ROOT_PASSWORD: CHANGE_ME_MINIO_PW
    volumes:
      - food_order_minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "59001:9001"   # 只開管理主控台方便你人工檢查/除錯,S3 API(9000)只在 Docker 內部網路使用,不對外開

  food_order_api:
    build: ./backend
    container_name: food_order_api
    restart: unless-stopped
    depends_on:
      food_order_db:
        condition: service_healthy
      food-order-minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://food_order:food_order@food_order_db:5432/food_order
      CORS_ORIGINS: http://localhost:5173,http://mike1-virtual-machine:55173,http://192.168.138.68:55173
      # v0.9: AI 菜單解析 -- read from a .env file next to this docker-compose.yml
      # (see .env.example). The ${VAR:-} form means this is safe even if .env
      # doesn't exist yet or doesn't define these -- it just falls back to an
      # empty string, and the AI feature is simply unavailable until you set
      # a key, instead of breaking the whole deploy.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # v0.10: Google Places API (New) -- separate Google product/project
      # from Gemini, needs its own key. See .env.example / README.md.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # v0.11: 餐廳照片改存 MinIO(物件儲存),不再整張塞進資料庫。這兩個值要
      # 跟上面 food-order-minio 服務的 MINIO_ROOT_USER/PASSWORD 一致。
      MINIO_ENDPOINT: http://food-order-minio:9000
      MINIO_ACCESS_KEY: food_order_minio
      MINIO_SECRET_KEY: CHANGE_ME_MINIO_PW
      MINIO_BUCKET: restaurant-photos
    ports:
      - "58000:8000"
    command: >
      sh -c "python -m app.seed; uvicorn app.main:app --host 0.0.0.0 --port 8000"

  food_order_web:
    build:
      context: ./frontend
      # v0.10 follow-up: no VITE_API_BASE build arg anymore -- nginx.conf
      # proxies /api/* to food_order_api internally, so the frontend just
      # calls a same-origin relative path. This is what fixed access over
      # Tailscale (or any other network) breaking on "編輯餐廳 -> 儲存變更":
      # baking in a fixed LAN IP only worked for devices on that exact LAN.
    container_name: food_order_web
    restart: unless-stopped
    depends_on:
      - food_order_api
      - food-order-minio   # nginx.conf's /media/ location proxies straight to MinIO
    ports:
      - "55173:80"

volumes:
  food_order_db_data:
  food_order_minio_data:
